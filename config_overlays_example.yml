libraries:
  Movies:
    report_path: /home/Kometa/config/reports/Movies.yml
    remove_overlays: false
    template_variables:
      sep_style: gray
      placeholder_imdb_id: tt8579674
    overlay_files:
    - default: runtimes
      template_variables:
        horizontal_align: center
        vertical_align: bottom
        text: ''
        back_width: 205
    # Creates a ribbon style background in the top left corner with a width of 313 pixels. Keep in mind, it has to be run before any overlay which is supposed to be on top of the background
    - url: https://raw.githubusercontent.com/s0len/meta-manager-config/main/overlays/background_top_left_313_wide.yml
    # Resolution in the upper left corner in 45 degree format
    - default: resolution
      template_variables:
        use_2160p: false
        url: https://raw.githubusercontent.com/s0len/meta-manager-config/main/overlays/resolution-top-left-45deg/<<overlay_name>>.png
        horizontal_align: left
        horizontal_offset: 0
        vertical_offset: 0
        vertical_align: top
        final_horizontal_offset: 0
        final_vertical_offset: 0
        back_width: 1000
        back_height: 1500
        back_color: 00
    # Audio in the upper left corner in 45 degree format
    - default: audio_codec
      template_variables:
        url: https://raw.githubusercontent.com/s0len/meta-manager-config/main/overlays/audio-top-left-45deg/<<key>>.png
        horizontal_align: left
        horizontal_offset: 0
        vertical_offset: 0
        vertical_align: top
        back_width: 1000
        back_height: 1500
        back_color: 00
    - default: mediastinger
    - default: commonsense
      template_variables:
        horizontal_align: left
        vertical_align: bottom
    - file: /home/Kometa/config/overlays_movies.yml
    settings:
      asset_directory: /home/Kometa/config/assets/Movies
      prioritize_assets: true
    operations:
      plex_bulk_edit_batch_size: 2000
      mass_content_rating_update: mdb_commonsense
      assets_for_all: true
