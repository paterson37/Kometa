libraries:
  Movies:
    report_path: /config/plexmetamanager/reports/Movies.yml
    remove_overlays: false
    template_variables:
      sep_style: gray
      placeholder_imdb_id: tt8579674
    collection_files:
    - default: separator_award
      schedule: weekly(sunday|thursday)
    - default: oscars
      schedule: weekly(sunday|thursday)
    - default: sundance
      schedule: weekly(sunday|thursday)
    - default: separator_chart
      schedule: weekly(sunday|thursday)
    - default: letterboxd
      schedule: weekly(sunday|thursday)
      template_variables:
        cache_builders: 7
        cache_builders_1001_movies: 30
        cache_builders_edgarwright: 30
    - default: trakt
      schedule: weekly(sunday|thursday)
    - default: universe
      schedule: weekly(sunday|thursday)
    - default: franchise
      schedule: weekly(sunday|thursday)
      template_variables:
        collection_section: '200'
    - file: /config/plexmetamanager/separator_franchise.yml
      schedule: weekly(sunday|thursday)
      template_variables:
        collection_section: '175'
    - default: streaming
      schedule: weekly(sunday|thursday)
      template_variables:
        originals_only: true
    - default: actor
      schedule: weekly(sunday|thursday)
      template_variables:
        data:
          depth: 1
          limit: 50
        style: diiivoycolor
    - default: director
      schedule: weekly(sunday|thursday)
      template_variables:
        data:
          depth: 1
          limit: 25
        style: diiivoycolor
    - default: director
      schedule: weekly(sunday|thursday)
      template_variables:
        include: David Lynch
        data:
          depth: 1
          limit: 25
        style: diiivoycolor
    - default: seasonal
      schedule:
      - weekly(sunday|thursday)
      - monthly(1)
      template_variables:
        sort_by: audience_rating.desc
        name_format: <<key_name>> <<library_translationU>>s In Movies
        visible_home: true
        visible_shared: true
        visible_library: true
    - default: decade
      schedule: weekly(sunday|thursday)
    - default: imdb
      schedule: weekly(sunday|thursday)
    - file: /config/plexmetamanager/Recently_Released/Recently Released Movies.yml
    - file: /config/plexmetamanager/Recently_Added/Recently Added Movies.yml
    - file: /config/plexmetamanager/Seasonal/Hallmark Christmas Movies.yml
      schedule:
        - weekly(sunday|thursday)
        - monthly(1)
      asset_directory: /config/plexmetamanager/assets
    operations:
      mass_user_rating_update: reset
