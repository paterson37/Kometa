playlist_files:
- default: playlist
  template_variables:
    libraries: Movies, Series, Anime, Anime - Movies, Animations - Movies, Animations - TV Shows
settings:
  cache: true
  cache_expiration: 60
  asset_folders: true
  asset_depth: 2
  create_asset_folders: true
  prioritize_assets: false
  dimensional_asset_rename: false
  download_url_assets: true
  show_missing_season_assets: false
  show_missing_episode_assets: false
  show_asset_not_needed: true
  sync_mode: append
  minimum_items: 1
  default_collection_order:
  delete_below_minimum: true
  delete_not_scheduled: false
  run_again_delay: 2
  missing_only_released: false
  only_filter_missing: false
  show_unmanaged: true
  show_unconfigured: true
  show_filtered: false
  show_options: true
  show_missing: true
  show_missing_assets: true
  save_report: true
  tvdb_language: eng
  ignore_ids:
  ignore_imdb_ids:
  item_refresh_delay: 0
  playlist_sync_to_users: all
  playlist_exclude_users:
  playlist_report: false
  custom_repo:
  run_order:
  - operations
  - metadata
  - collections
  - overlays
  overlay_artwork_filetype: jpg
  overlay_artwork_quality: 90
  show_unfiltered: false
  asset_directory: /config/plexmetamanager/assets
webhooks:                                           # Can be individually specified per library as well
  error: [REDACTED]
  run_start: [REDACTED]
  run_end: [REDACTED]
  changes: [REDACTED]
  version: [REDACTED]
  delete: [REDACTED]
plex:                                               # Can be individually specified per library as well; REQUIRED for the script to run
  url: [REDACTED]
  token: [REDACTED]
  timeout: 360
  clean_bundles: true
  empty_trash: true
  optimize: false
  db_cache: 8192                                    # 2048 MB is 2GB which is what I use. Adjust for your system as 2048 MB (2 GB) is probably a good starting point compared to the default Plex value of 40 MB
  verify_ssl:
tmdb:                                               # REQUIRED for the script to run
  apikey: [REDACTED]
  language: en
  region: GB                                        # Upper case ISO 3166-1 Code 
  cache_expiration: 60
omdb:
  apikey: [REDACTED]
  cache_expiration: 60
mdblist:
  apikey: [REDACTED]
  cache_expiration: 60
